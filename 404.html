<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Blinky</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #1E1E1E;
    }

    .window {
      background: #232323;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      opacity: 0;
      transform: scale(0.9) translateY(40px);
    }

    .content-box {
      background: #323232;
      border-radius: 10px;
    }

    .btn-home {
      background: #282828;
      border: 2px solid #4682B4;
      transition: all .25s ease;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(70,130,180,.3);
    }

    .glow {
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: .6; }
      100% { opacity: 1; }
    }

    .big-404 {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: #4682B4;
      text-shadow: 0 0 30px rgba(70,130,180,.25);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="window w-full max-w-3xl overflow-hidden">

    <!-- Fake window title bar because it looks cool -->
    <div class="bg-[#232323] px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-feather="box" class="text-[#4682B4]"></i>
        <h1 class="text-white font-bold">Blinky Loader</h1>
      </div>

      <div class="flex gap-3">
        <div class="w-3 h-3 rounded-full bg-red-500"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
        <div class="w-3 h-3 rounded-full bg-green-500"></div>
      </div>
    </div>

    <div class="content-box p-10 text-center">

      <!-- Yeah... this page definitely isn't here -->
      <div class="big-404 glow">404</div>

      <h2 class="text-3xl font-bold text-white mt-2">
        Nothing here.
      </h2>

      <p class="text-gray-300 mt-4 max-w-xl mx-auto">
        What are you searching for? :)
      </p>

      <p class="text-gray-500 mt-3 text-sm max-w-lg mx-auto">
        We checked under the couch and behind the server, yet this page doesn't seem to exist.
      </p>

      <!-- Giving visitors a way back before they start questioning reality -->
      <div class="mt-8">
        <a href="/"
           class="btn-home inline-flex items-center px-6 py-3 rounded-lg text-white font-semibold">
          <i data-feather="home" class="mr-2"></i>
          Take Me Home
        </a>
      </div>


    </div>

    <div class="bg-[#232323] px-6 py-3 text-center">
      <p class="text-[#969696] text-sm">
        © 2026 Blinky Loader
      </p>
    </div>

  </div>

  <script>
    feather.replace();

    // Smooth little entrance animation
    window.addEventListener("load", () => {
      anime({
        targets: ".window",
        opacity: [0, 1],
        scale: [0.9, 1],
        translateY: [40, 0],
        easing: "easeOutExpo",
        duration: 1200
      });
    });

    // Tiny hover bounce because static buttons are boring
    const btn = document.querySelector(".btn-home");

    btn.addEventListener("mouseenter", () => {
      anime({
        targets: btn,
        scale: 1.05,
        duration: 200
      });
    });

    btn.addEventListener("mouseleave", () => {
      anime({
        targets: btn,
        scale: 1,
        duration: 200
      });
    });
  </script>

</body>
</html>
